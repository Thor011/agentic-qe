name: Sync Fork with Upstream

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote | grep -q upstream || git remote add upstream https://github.com/proffesor-for-testing/agentic-qe.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream into default branch
        run: |
          git checkout main
          if git merge upstream/main --no-edit; then
            git push origin main
            echo "✅ Fork synced with upstream successfully."
          else
            echo "⚠️ Merge conflict detected. Aborting merge — manual resolution required."
            git merge --abort
            exit 1
          fi
